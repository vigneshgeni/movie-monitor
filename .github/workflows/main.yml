name: Check Jana Nayagan Bengaluru theatres

on:
  schedule:
    - cron: "30 1-17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps chromium

      - name: Check listing and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
        run: python monitor.py

      - name: Save theatre baseline
        run: |
          git config user.name "movie-monitor[bot]"
          git config user.email "movie-monitor[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update theatre baseline"
          git push
